<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI CLI History Viewer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
        id="hljs-dark-theme" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
        id="hljs-light-theme" disabled />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="source-selector">
                    <button class="source-toggle" id="sourceToggle" title="Switch history source">
                        <span class="source-title" id="sourceTitle">Claude History</span>
                        <svg class="dropdown-arrow" width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z" />
                        </svg>
                    </button>
                    <div class="source-dropdown" id="sourceDropdown">
                        <div class="source-item" data-source="claude">
                            Claude CLI
                        </div>
                        <div class="source-item" data-source="codex">
                            Codex CLI
                        </div>
                        <div class="source-item" data-source="gemini">
                            Gemini CLI
                        </div>
                    </div>
                </div>
                <div class="stats" id="stats"></div>
            </div>


            <div class="projects-container">
                <div id="projectsList" class="projects-list"></div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- Header Actions -->
            <div class="header-actions">
                <button id="openSearchBtn" class="action-btn" title="Search (Ctrl+K)">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <path
                            d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z" />
                    </svg>
                </button>
                <button id="themeToggle" class="theme-toggle" title="Toggle theme">
                    <svg class="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        style="display: none">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
            <!-- 对话列表视图 -->
            <div id="listView" class="view active">
                <div class="view-header">
                    <h2 id="currentProjectTitle">Select a Project</h2>
                    <div class="view-info" id="conversationCount"></div>
                </div>
                <div id="conversationsList" class="conversations-list"></div>
            </div>

            <!-- 对话详情视图 -->
            <div id="detailView" class="view">
                <div class="view-header">
                    <button id="backBtn" class="btn-secondary">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z" />
                        </svg>
                        Back
                    </button>
                    <div class="conversation-meta" id="conversationMeta"></div>
                </div>
                <div id="conversationDetail" class="conversation-detail"></div>
            </div>

            <!-- 搜索模态框 -->
            <div id="searchModal" class="search-modal">
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
                            <path
                                d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z" />
                        </svg>
                        <input type="text" id="searchInput" placeholder="Search conversations across projects..."
                            autocomplete="off" />
                        <button id="closeSearchBtn" class="btn-close-search">ESC</button>
                    </div>
                    <div id="searchModalResults" class="search-modal-results"></div>
                </div>
            </div>

            <!-- 搜索结果视图 (保留原有结果逻辑，但现在由模态框展现更好的体验) -->
            <div id="searchView" class="view">
                <div class="view-header">
                    <h2>Search Results</h2>
                    <button id="clearSearchBtn" class="btn-secondary">
                        Clear
                    </button>
                </div>
                <div id="searchResults" class="conversations-list"></div>
            </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>

</html>
