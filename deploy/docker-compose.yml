services:
  acliv-web:
    image: "${ACLIV_IMAGE:-ghcr.io/occva/acliv}:${ACLIV_VERSION:-latest}"
    container_name: acliv-web
    restart: unless-stopped
    ports:
      - "${BIND_HOST:-0.0.0.0}:${ACLIV_PORT:-17860}:17860"
    environment:
      - ACLIV_HOST=0.0.0.0
      - ACLIV_PORT=17860
      - ACLIV_HOME=/app/data
      - ACLIV_TOKEN=${ACLIV_TOKEN:?ACLIV_TOKEN is required}
      - ACLIV_CLAUDE_DIR=/host-data/claude/projects
      - ACLIV_CODEX_DIR=/host-data/codex/sessions
      - ACLIV_GEMINI_DIR=/host-data/gemini/tmp
      - ACLIV_OPENCLAW_DIR=/host-data/openclaw/agents
      - ACLIV_OPENCODE_DIR=/host-data/opencode/storage
      - ACLIV_RUN_AS_ROOT=${ACLIV_RUN_AS_ROOT:-0}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - app_data:/app/data
      - ${CLAUDE_DIR:-./empty/claude}:/host-data/claude:ro
      - ${CODEX_DIR:-./empty/codex}:/host-data/codex:ro
      - ${GEMINI_DIR:-./empty/gemini}:/host-data/gemini:ro
      - ${OPENCLAW_DIR:-./empty/openclaw}:/host-data/openclaw:ro
      - ${OPENCODE_DIR:-./empty/opencode}:/host-data/opencode:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:17860/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  app_data:
    driver: local
